services:
  - type: web
    name: ai-interview-backend
    env: python
    plan: free
    autoDeploy: true
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GROQ_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: PORT
        value: "10000"
    healthCheckPath: /api/health

  - type: web
    name: ai-interview-node-backend
    env: node
    plan: free
    autoDeploy: true
    rootDir: node-backend
    buildCommand: |
      npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: "10000"
    healthCheckPath: /health

  - type: web
    name: ai-interview-frontend
    env: static
    plan: free
    autoDeploy: true
    rootDir: frontend
    buildCommand: |
      npm install
      npm run build
    staticPublishPath: ./build
    envVars:
      - key: NODE_ENV
        value: production
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
